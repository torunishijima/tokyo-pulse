<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokyo Pulse</title>

  <!-- MapLibre GL JS (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 地図コンテナ -->
  <div id="map"></div>

  <!-- 情報オーバーレイ（左上） -->
  <div id="overlay">
    <div id="overlay-header">
      <span id="clock">--:--</span>
      <span id="status">
        <span id="status-dot"></span>
        <span id="status-text">接続中…</span>
      </span>
      <button id="collapse-btn" title="パネルを折りたたむ">−</button>
    </div>
    <div id="overlay-body">
      <div id="bus-count">
        <span id="count-toei"     class="count-toei     toggle-btn" data-key="toei">都営 — 台</span>
        <span id="count-seibu"    class="count-seibu    toggle-btn" data-key="seibu">西武 — 台</span>
        <span id="count-yokohama" class="count-yokohama toggle-btn" data-key="yokohama">横浜市営 — 台</span>
      </div>
      <div id="train-count">
        <span id="count-trains" class="count-trains">地下鉄・都電 — 本</span>
      </div>
      <div id="train-toggles">
        <span class="train-toggle toggle-btn" data-line="Asakusa">浅草</span>
        <span class="train-toggle toggle-btn" data-line="Mita">三田</span>
        <span class="train-toggle toggle-btn" data-line="Shinjuku">新宿</span>
        <span class="train-toggle toggle-btn" data-line="Oedo">大江戸</span>
        <span class="train-toggle toggle-btn" data-line="Arakawa">荒川</span>
      </div>
    </div>
  </div>

  <!-- 右下アクションボタン -->
  <div id="actions">
    <button id="refresh-btn" class="action-btn" title="今すぐ更新">⟳</button>
    <button id="locate-btn" class="action-btn" title="現在地へ移動">◎</button>
    <a href="game.html" id="game-btn" class="action-btn" title="Tokyo Rush ゲームで遊ぶ">🎮</a>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
