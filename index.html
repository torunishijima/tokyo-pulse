<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tokyo Pulse</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tokyo Pulse">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg" type="image/svg+xml">

  <!-- MapLibre GL JS (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 地図コンテナ -->
  <div id="map"></div>

  <!-- 情報オーバーレイ（左上） -->
  <div id="overlay">
    <div id="overlay-header">
      <span id="clock">--:--</span>
      <span id="status">
        <span id="status-dot"></span>
        <span id="status-text">接続中…</span>
      </span>
      <button id="collapse-btn" title="パネルを折りたたむ">−</button>
    </div>
    <div id="overlay-body">
      <div id="bus-count" role="group" aria-label="バス事業者の表示切り替え">
        <button type="button" id="count-toei"     class="count-toei     toggle-btn" data-key="toei"     aria-pressed="true">都営 — 台</button>
        <button type="button" id="count-seibu"    class="count-seibu    toggle-btn" data-key="seibu"    aria-pressed="true">西武 — 台</button>
        <button type="button" id="count-yokohama" class="count-yokohama toggle-btn" data-key="yokohama" aria-pressed="true">横浜市営 — 台</button>
      </div>
      <div id="train-count">
        <span id="count-trains" class="count-trains">地下鉄・都電 — 本</span>
      </div>
      <div id="train-toggles" role="group" aria-label="路線の表示切り替え">
        <button type="button" class="train-toggle toggle-btn" data-line="Asakusa"  aria-pressed="true">浅草</button>
        <button type="button" class="train-toggle toggle-btn" data-line="Mita"     aria-pressed="true">三田</button>
        <button type="button" class="train-toggle toggle-btn" data-line="Shinjuku" aria-pressed="true">新宿</button>
        <button type="button" class="train-toggle toggle-btn" data-line="Oedo"     aria-pressed="true">大江戸</button>
        <button type="button" class="train-toggle toggle-btn" data-line="Arakawa"  aria-pressed="true">荒川</button>
      </div>
    </div>
  </div>

  <!-- 右下アクションボタン -->
  <div id="actions">
    <button id="refresh-btn" class="action-btn" title="今すぐ更新">⟳</button>
    <button id="locate-btn" class="action-btn" title="現在地へ移動">◎</button>
    <a href="game.html" id="game-btn" class="action-btn" title="Tokyo Rush ゲームで遊ぶ">🎮</a>
  </div>

  <script src="js/main.js"></script>

  <!-- Service Worker 登録（PWA / オフライン対応） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('[tokyo-pulse] SW 登録失敗:', err.message);
        });
      });
    }
  </script>
</body>
</html>
